services:
  cli-proxy-api:
    image: ${CLI_PROXY_IMAGE:-cli-proxy-api:local}
    pull_policy: build
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VERSION: ${VERSION:-dev}
        COMMIT: ${COMMIT:-none}
        BUILD_DATE: ${BUILD_DATE:-unknown}
    container_name: cli-proxy-api
    env_file:
      - .env
    environment:
      DEPLOY: ${DEPLOY:-production}
      TZ: ${TZ:-Asia/Shanghai}
      MANAGEMENT_STATIC_PATH: /CLIProxyAPI/static
    ports:
      - "8317:8317"   # 主 API 端口
      - "8085:8085"   # 管理面板端口（可选）
      - "1455:1455"   # OAuth 回调端口（可选）
      - "54545:54545" # 额外端口（可选）
      - "51121:51121" # 额外端口（可选）
      - "11451:11451" # 额外端口（可选）
    volumes:
      # 配置文件（读写）
      - ${CLI_PROXY_CONFIG_PATH:-./config.yaml}:/CLIProxyAPI/config.yaml:rw
      # 认证文件目录（读写）
      - ${CLI_PROXY_AUTH_PATH:-./auths}:/root/.cli-proxy-api:rw
      # 日志目录（读写）
      - ${CLI_PROXY_LOG_PATH:-./logs}:/CLIProxyAPI/logs:rw
      - ./static:/CLIProxyAPI/static:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8317/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - cli-proxy-network

networks:
  cli-proxy-network:
    driver: bridge
