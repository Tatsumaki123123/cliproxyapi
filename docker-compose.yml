services:
  postgres:
    image: postgres:16-alpine
    container_name: cli-proxy-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-cliproxy}
      POSTGRES_USER: ${POSTGRES_USER:-cliproxy}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cliproxy_password}
      TZ: ${TZ:-Asia/Shanghai}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cliproxy}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cli-proxy-network

  cli-proxy-api:
    image: ${CLI_PROXY_IMAGE:-cli-proxy-api:local}
    pull_policy: build
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VERSION: ${VERSION:-dev}
        COMMIT: ${COMMIT:-none}
        BUILD_DATE: ${BUILD_DATE:-unknown}
    container_name: cli-proxy-api
    env_file:
      - .env
    environment:
      DEPLOY: ${DEPLOY:-production}
      TZ: ${TZ:-Asia/Shanghai}
      # Postgres Store 配置
      POSTGRES_STORE_DSN: ${POSTGRES_STORE_DSN:-postgresql://${POSTGRES_USER:-cliproxy}:${POSTGRES_PASSWORD:-cliproxy_password}@postgres:5432/${POSTGRES_DB:-cliproxy}?sslmode=disable}
      POSTGRES_STORE_SCHEMA: ${POSTGRES_STORE_SCHEMA:-public}
      WRITABLE_BASE: /tmp
    ports:
      - "8317:8317"   # 主 API 端口
      - "8085:8085"   # 管理面板端口（可选）
      - "1455:1455"   # OAuth 回调端口（可选）
      - "54545:54545" # 额外端口（可选）
      - "51121:51121" # 额外端口（可选）
      - "11451:11451" # 额外端口（可选）
    volumes:
      # 配置文件（只读，作为初始模板）
      - ${CLI_PROXY_CONFIG_PATH:-./config.yaml}:/CLIProxyAPI/config.yaml:ro
      # 日志目录（读写）
      - ${CLI_PROXY_LOG_PATH:-./logs}:/CLIProxyAPI/logs
      # 临时目录（读写，用于 Postgres Store 本地缓存）
      - pgstore_cache:/tmp
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8317/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - cli-proxy-network

volumes:
  postgres_data:
  pgstore_cache:

networks:
  cli-proxy-network:
    driver: bridge
